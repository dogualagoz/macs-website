name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Sync backend files to VPS
        run: |
          rsync -avz --delete \
            --exclude='venv' \
            --exclude='.env' \
            --exclude='__pycache__' \
            --exclude='*.pyc' \
            --exclude='static/uploads' \
            ./backend/ \
            root@${{ secrets.VPS_HOST }}:/var/www/vhosts/api.macsclub.com.tr/httpdocs/

      - name: Install dependencies & restart gunicorn
        run: |
          ssh root@${{ secrets.VPS_HOST }} "
            source /var/www/vhosts/api.macsclub.com.tr/venv/bin/activate &&
            pip install -r /var/www/vhosts/api.macsclub.com.tr/httpdocs/requirements.txt &&
            kill -HUP \$(cat /var/run/macs-backend.pid)
          "
